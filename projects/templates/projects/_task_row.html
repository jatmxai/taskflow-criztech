<li id="task-{{ task.pk }}"
    class="px-5 py-3 hover:bg-slate-50/60 transition flex items-center gap-3 group animate-fade-in"
    x-data="{ confirmDelete: false }">

    <button hx-post="{% url 'task_toggle' task.pk %}"
            hx-target="#task-{{ task.pk }}"
            hx-swap="outerHTML"
            class="w-5 h-5 rounded-md border-[1.5px] flex items-center justify-center transition flex-shrink-0
                   {% if task.is_done %}bg-brand-600 border-brand-600 shadow-sm{% else %}border-slate-300 hover:border-brand-500 hover:bg-brand-50{% endif %}">
        {% if task.is_done %}
        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        {% endif %}
    </button>

    <div class="flex-1 min-w-0">
        <p class="text-[14px] truncate {% if task.is_done %}line-through text-slate-400{% else %}text-slate-900{% endif %}">
            {{ task.title }}
        </p>
        <div class="flex items-center gap-2 mt-1">
            {% if task.priority == 'high' %}
                <span class="inline-flex items-center gap-1 text-[11px] font-medium px-1.5 py-0.5 rounded bg-red-50 text-red-700 ring-1 ring-inset ring-red-200">
                    <span class="w-1 h-1 rounded-full bg-red-500"></span> High
                </span>
            {% elif task.priority == 'medium' %}
                <span class="inline-flex items-center gap-1 text-[11px] font-medium px-1.5 py-0.5 rounded bg-amber-50 text-amber-700 ring-1 ring-inset ring-amber-200">
                    <span class="w-1 h-1 rounded-full bg-amber-500"></span> Medium
                </span>
            {% else %}
                <span class="inline-flex items-center gap-1 text-[11px] font-medium px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 ring-1 ring-inset ring-slate-200">
                    <span class="w-1 h-1 rounded-full bg-slate-400"></span> Low
                </span>
            {% endif %}
            {% if task.due_date %}
                <span class="inline-flex items-center gap-1 text-[11px] font-medium text-slate-500">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    {{ task.due_date|date:"M j" }}
                </span>
            {% endif %}
        </div>
    </div>

    <button @click="confirmDelete = true"
            class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 opacity-0 group-hover:opacity-100 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
    </button>

    <div x-show="confirmDelete" x-cloak x-transition.opacity
         class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"
         @click.self="confirmDelete = false">
        <div x-show="confirmDelete"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6">
            <div class="w-12 h-12 rounded-full bg-red-50 text-red-600 flex items-center justify-center mb-4">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
            </div>
            <h3 class="text-lg font-bold tracking-tight text-slate-900">Delete task?</h3>
            <p class="text-sm text-slate-500 mt-1.5">"<span class="font-medium text-slate-700">{{ task.title }}</span>" will be permanently removed.</p>
            <div class="flex gap-2 justify-end mt-6">
                <button @click="confirmDelete = false" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition">Cancel</button>
                <button hx-delete="{% url 'task_delete' task.pk %}"
                        hx-target="#task-{{ task.pk }}"
                        hx-swap="outerHTML swap:400ms"
                        hx-on::before-request="document.getElementById('task-{{ task.pk }}').classList.add('fade-out'); confirmDelete = false"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold hover:bg-red-700 transition">Delete task</button>
            </div>
        </div>
    </div>
</li>
