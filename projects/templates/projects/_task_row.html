<li id="task-{{ task.pk }}"
    class="px-6 py-3 hover:bg-gray-50 transition flex items-center gap-3 group"
    x-data="{ confirmDelete: false }"
    hx-swap-oob="true">
    <button hx-post="{% url 'task_toggle' task.pk %}"
            hx-target="#task-{{ task.pk }}"
            hx-swap="outerHTML"
            class="w-5 h-5 rounded border-2 flex items-center justify-center transition flex-shrink-0
                   {% if task.is_done %}bg-blue-600 border-blue-600{% else %}border-gray-300 hover:border-blue-500{% endif %}">
        {% if task.is_done %}
        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
        </svg>
        {% endif %}
    </button>

    <div class="flex-1 min-w-0">
        <p class="text-gray-900 truncate {% if task.is_done %}line-through text-gray-400{% endif %}">
            {{ task.title }}
        </p>
        <div class="flex items-center gap-2 mt-0.5">
            {% if task.priority == 'high' %}
                <span class="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-700">High</span>
            {% elif task.priority == 'medium' %}
                <span class="text-xs px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700">Medium</span>
            {% else %}
                <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">Low</span>
            {% endif %}
            {% if task.due_date %}
                <span class="text-xs text-gray-500">📅 {{ task.due_date|date:"M d" }}</span>
            {% endif %}
        </div>
    </div>

    <button @click="confirmDelete = true"
            class="p-2 rounded hover:bg-red-50 text-gray-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"></path>
        </svg>
    </button>

    <div x-show="confirmDelete"
         x-cloak
         x-transition.opacity
         class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"
         @click.self="confirmDelete = false">
        <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6">
            <h3 class="text-lg font-bold text-gray-900 mb-2">Delete task?</h3>
            <p class="text-sm text-gray-500 mb-4">"{{ task.title }}" will be permanently removed.</p>
            <div class="flex gap-2 justify-end">
                <button @click="confirmDelete = false" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button hx-delete="{% url 'task_delete' task.pk %}"
                        hx-target="#task-{{ task.pk }}"
                        hx-swap="outerHTML swap:500ms"
                        hx-on::before-request="document.getElementById('task-{{ task.pk }}').classList.add('fade-out'); confirmDelete = false"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button>
            </div>
        </div>
    </div>
</li>
