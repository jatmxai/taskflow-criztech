{% if query %}
    {% if tasks %}
        <div class="border-t border-slate-100 dark:border-slate-800 max-h-96 overflow-y-auto">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 px-4 pt-3 pb-1">{{ tasks|length }} result{{ tasks|length|pluralize }}</p>
            {% for task in tasks %}
                <a href="{% url 'project_detail' task.project.pk %}"
                   class="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
                    <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0"
                         style="background-color: {{ task.project.color }}1a; color: {{ task.project.color }};">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm truncate {% if task.is_done %}line-through text-slate-400{% endif %}">{{ task.title }}</p>
                        <p class="text-xs text-slate-500">{{ task.project.name }}</p>
                    </div>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="border-t border-slate-100 dark:border-slate-800 py-6 text-center">
            <p class="text-sm text-slate-500">No tasks found for "<span class="font-medium">{{ query }}</span>"</p>
        </div>
    {% endif %}
{% endif %}
