<li class="px-5 py-3 hover:bg-slate-50/60 dark:hover:bg-slate-800/40 transition flex items-center gap-3 group">
    <button hx-post="{% url 'task_toggle' task.pk %}"
            hx-target="closest li"
            hx-swap="outerHTML swap:300ms"
            hx-on::before-request="this.closest('li').classList.add('fade-out')"
            class="w-5 h-5 rounded-md border-[1.5px] flex items-center justify-center transition flex-shrink-0
                   {% if task.is_done %}bg-brand-600 border-brand-600{% else %}border-slate-300 dark:border-slate-600 hover:border-brand-500{% endif %}">
        {% if task.is_done %}
        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        {% endif %}
    </button>
    <a href="{% url 'project_detail' task.project.pk %}" class="flex-1 min-w-0">
        <p class="text-sm truncate {% if task.is_done %}line-through text-slate-400{% endif %}">{{ task.title }}</p>
        <div class="flex items-center gap-2 mt-0.5">
            <span class="inline-flex items-center gap-1 text-[11px] font-medium text-slate-500">
                <span class="w-1.5 h-1.5 rounded-full" style="background-color: {{ task.project.color }};"></span>
                {{ task.project.name }}
            </span>
            {% if overdue %}
                <span class="text-[11px] font-medium text-red-600">Overdue · {{ task.due_date|date:"M j" }}</span>
            {% else %}
                <span class="text-[11px] font-medium text-amber-600">Due today</span>
            {% endif %}
            {% if task.priority == 'high' %}
                <span class="inline-flex items-center gap-1 text-[11px] font-medium px-1.5 py-0.5 rounded bg-red-50 dark:bg-red-950 text-red-700 dark:text-red-400">High</span>
            {% endif %}
        </div>
    </a>
    <button @click="$store.focus.start('{{ task.title|escapejs }}', {{ task.pk }})"
            class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-brand-600 hover:bg-brand-50 dark:hover:bg-brand-950 opacity-0 group-hover:opacity-100 transition" title="Focus mode">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </button>
</li>
