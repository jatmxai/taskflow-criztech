{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.body && document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = document.querySelector('[name=csrfmiddlewaretoken]').value;
        });
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .fade-out { opacity: 0; transition: opacity 500ms ease-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans"
      x-data="{
          toasts: [],
          addToast(message, type='info') {
              const id = Date.now();
              this.toasts.push({ id, message, type });
              setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3000);
          }
      }"
      @show-toast.window="addToast($event.detail.message, $event.detail.type)">

    {% csrf_token %}

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'index' %}" class="flex items-center gap-2 text-xl font-bold text-gray-900">
                <span class="text-2xl">📋</span>
                <span>TaskFlow</span>
            </a>
            {% if user.is_authenticated %}
            <div class="flex items-center gap-4">
                <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                    <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition">
                        <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-semibold">
                            {{ user.username|first|upper }}
                        </div>
                        <span class="text-sm font-medium text-gray-700">{{ user.username }}</span>
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div x-show="open"
                         x-cloak
                         x-transition:enter="transition ease-out duration-150"
                         x-transition:enter-start="opacity-0 scale-95"
                         x-transition:enter-end="opacity-100 scale-100"
                         class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                        <a href="/admin/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Admin</a>
                        <form action="{% url 'logout' %}" method="post" class="block">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Logout</button>
                        </form>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="flex gap-2">
                <a href="{% url 'login' %}" class="px-4 py-2 text-sm text-gray-700 hover:text-gray-900">Login</a>
                <a href="{% url 'register' %}" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">Sign up</a>
            </div>
            {% endif %}
        </div>
    </nav>

    {% if messages %}
        <div class="max-w-6xl mx-auto px-4 mt-4">
            {% for message in messages %}
                <div class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-2 rounded-lg mb-2">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <div class="fixed top-4 right-4 z-50 space-y-2">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-8"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 :class="{
                     'bg-green-500': toast.type === 'success',
                     'bg-red-500': toast.type === 'error',
                     'bg-blue-500': toast.type === 'info'
                 }"
                 class="text-white px-4 py-3 rounded-lg shadow-lg min-w-[240px] flex items-center gap-2">
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>

    <script>
        document.body.addEventListener('showToast', function(evt) {
            window.dispatchEvent(new CustomEvent('show-toast', { detail: evt.detail }));
        });
    </script>
</body>
</html>
